<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>TEM – Zeit Root</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas, monospace; padding:20px; }
h1, h2 { color:#6cf; }
a { color:#6cf; display:block; margin:10px 0; font-size:18px; }
hr { border:1px solid #333; margin:25px 0; }
pre { background:#111; padding:12px; border:1px solid #333; }
#hh-panel { margin-top:20px; padding:12px; border:1px solid #333; }
</style>

<!-- Routing + Auto-Erkennung laden -->
<script src="routing.js"></script>

</head>
<body>

<h1>TEM – Zeit Root</h1>
<p>TEM = Zeit‑Engine des 3hit90‑Systems</p>

<hr>

<h2>System‑Module</h2>
<a href="https://iki1uc.github.io/3hit90/index.html">SYS.index</a>
<a href="TEM.id.json">TEM.id.json</a>

<hr>

<h2>HH – Host‑Hub Panel</h2>
<div id="hh-panel">Lade Routing…</div>

<hr>

<h2>System Info</h2>
<pre id="tem-info">Lade TEM Daten…</pre>

<script>
// TEM.id.json laden
fetch("TEM.id.json")
    .then(r => r.json())
    .then(data => {
        document.getElementById("tem-info").innerText =
            JSON.stringify(data, null, 4);
    })
    .catch(() => {
        document.getElementById("tem-info").innerText =
            "Fehler: TEM.id.json konnte nicht geladen werden.";
    });
</script>

</body>
</html>
